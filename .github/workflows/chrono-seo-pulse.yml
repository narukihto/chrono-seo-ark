name: Chrono-SEO Pulse

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch: 

permissions:
  contents: write
  pages: write      
  id-token: write   

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛰️ Synchronizing Repository
        uses: actions/checkout@v4

      - name: 🦀 Initializing Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Creating Temporary Vault Gate
        run: mkdir -p vault # نجبر النظام على خلق المجلد ليتوافق مع مخرج المحرك (../vault)

      - name: ⚡ Executing Penta-V Pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd agent
          cargo run --release -- --debug

      - name: 🔍 Locating Truth-Vault (Debug Step)
        run: |
          echo "Searching for truth-vault.json..."
          find . -name "truth-vault.json"

      - name: 🛡️ Committing Updated Data
        run: |
          git config --global user.name "Ark Systems (Pulse-Bot)"
          git config --global user.email "bot@ark-systems.io"
          # المحرك يضعه في ../vault بالنسبة لمجلد agent، أي في vault/ في الجذر
          git add vault/truth-vault.json || git add truth-vault.json
          git commit -m "⚡ [PULSE] Protocol 1.1.0-PURIFIED" || echo "No changes"
          git push

      - name: 🏗️ Injecting Data to Interface
        run: |
          # التأكد من وصول الملف للواجهة من أي مسار وجد فيه
          find . -name "truth-vault.json" -exec cp {} interface/truth-vault.json \;
          # جلب الجسر
          cp integration/client_bridge.js interface/ || echo "Bridge not found"

      - name: 🏗️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 🚀 Uploading Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './interface'

      - name: 🏛️ Activation
        id: deployment
        uses: actions/deploy-pages@v4
