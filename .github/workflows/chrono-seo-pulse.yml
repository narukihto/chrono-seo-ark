name: Chrono-SEO Pulse

on:
  schedule:
    # Ark Frequency: Pulse every 6 minutes for high-velocity signal capture
    - cron: '*/6 * * * *'
  workflow_dispatch: # Allows manual pulse triggering for architectural calibration

permissions:
  contents: write
  pages: write      # Required for neural dashboard deployment
  id-token: write   # Required for sovereign OIDC handshaking

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15 

    steps:
      - name: 🛰️ Synchronizing Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for accurate temporal commits

      - name: 🦀 Initializing Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Caching Binary Artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            agent/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🛡️ Setting Environment Guard
        run: |
          echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" >> $GITHUB_ENV
          echo "SERP_API_KEY=${{ secrets.SERP_API_KEY }}" >> $GITHUB_ENV
          echo "COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }}" >> $GITHUB_ENV
          echo "FREE_CRYPTO_KEY=${{ secrets.FREE_CRYPTO_KEY }}" >> $GITHUB_ENV

      - name: ⚡ Executing Penta-V Pulse (Purified Engine)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARK_API_KEY: ${{ env.ARK_API_KEY }}
          SERP_API_KEY: ${{ env.SERP_API_KEY }}
          COINGECKO_API_KEY: ${{ env.COINGECKO_API_KEY }}
          FREE_CRYPTO_KEY: ${{ env.FREE_CRYPTO_KEY }}
        run: |
          # Running the high-performance Rust agent to capture 47 signals
          cargo run --release --manifest-path agent/Cargo.toml -- --debug

      - name: 🛡️ Committing to Truth-Vault
        if: success()
        run: |
          git config --global user.name "Ark Systems (Pulse-Bot)"
          git config --global user.email "bot@ark-systems.io"
          git add vault/truth-vault.json
          # Commit using the new Purified Protocol signature
          git commit -m "⚡ [PULSE] $(date -u +'%Y-%m-%dT%H:%M:%SZ') | Protocol 1.1.0-PURIFIED Synchronized" || echo "No changes to commit"
          git push

      # --- New Architectural Phase: Dashboard Deployment ---

      - name: 🏗️ Setup Pages Environment
        uses: actions/configure-pages@v3

      - name: 🚀 Deploy Sovereign Neural Dashboard
        uses: actions/upload-pages-artifact@v2
        with:
          # Pointing to the new interface directory to fix Jekyll errors
          path: './interface'

      - name: 🏛️ Neural Link Activation
        uses: actions/deploy-pages@v2

      # --- Final Phase: Notification ---

      - name: 📢 Triggering Webhook Observer (Discord)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          # Projecting real-time signals to the Architect's Discord channel
          if [ ! -z "$WEBHOOK_URL" ]; then
            curl -X POST $WEBHOOK_URL -H "Content-Type: application/json" -d @vault/truth-vault.json
          fi
