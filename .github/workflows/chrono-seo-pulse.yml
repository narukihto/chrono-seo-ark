name: Chrono-SEO Pulse

on:
  schedule:
    # High-Velocity Pulse: Every 6 minutes
    - cron: '*/6 * * * *'
  workflow_dispatch: 

permissions:
  contents: write
  pages: write      
  id-token: write   

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🛰️ Synchronizing Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🦀 Initializing Rust (Stable/Penta-V)
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Caching Binary Artifacts
        uses: actions/cache@v4 # Upgraded to v4 to fix compatibility
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            agent/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🛡️ Setting Environment Guard
        run: |
          echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" >> $GITHUB_ENV
          echo "SERP_API_KEY=${{ secrets.SERP_API_KEY }}" >> $GITHUB_ENV
          echo "COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }}" >> $GITHUB_ENV
          echo "FREE_CRYPTO_KEY=${{ secrets.FREE_CRYPTO_KEY }}" >> $GITHUB_ENV

      - name: ⚡ Executing Penta-V Pulse (Purified Engine)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Running the high-performance agent to refresh truth-vault.json
          cargo run --release --manifest-path agent/Cargo.toml -- --debug

      - name: 🛡️ Committing to Truth-Vault
        if: success()
        run: |
          git config --global user.name "Ark Systems (Pulse-Bot)"
          git config --global user.email "bot@ark-systems.io"
          git add vault/truth-vault.json
          git add reports/performance_log.md || true
          git commit -m "⚡ [PULSE] $(date -u +'%Y-%m-%dT%H:%M:%SZ') | Protocol 1.1.0-PURIFIED" || echo "No changes"
          git push

      # --- Neural Dashboard Deployment Phase (Upgraded for 2026 Standards) ---

      - name: 🏗️ Setup Pages Infrastructure
        uses: actions/configure-pages@v4 # Upgraded to v4 to fix deprecation

      - name: 🚀 Uploading Purified Interface
        uses: actions/upload-pages-artifact@v3 # Upgraded to v3 to resolve artifact errors
        with:
          # Pointing directly to the interface folder containing index.html
          path: './interface'

      - name: 🏛️ Activating Neural Link (Deployment)
        id: deployment
        uses: actions/deploy-pages@v4 # Upgraded to v4 for final deployment

      # --- Final Notification Protocol ---

      - name: 📢 Dispatching Elite Signals (Discord)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ ! -z "$WEBHOOK_URL" ]; then
            curl -X POST $WEBHOOK_URL -H "Content-Type: application/json" -d @vault/truth-vault.json
          fi
