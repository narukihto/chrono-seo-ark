name: Chrono-SEO Pulse

on:
  schedule:
    # Ark Frequency: Pulse every 6 minutes
    - cron: '*/6 * * * *'
  workflow_dispatch: # Allows manual pulse triggering for architectural testing

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Increased slightly to accommodate Criterion analysis

    steps:
      - name: 🛰️ Synchronizing Repository
        uses: actions/checkout@v4

      - name: 🦀 Initializing Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      - name: ⚙️ Caching Binary Artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            agent/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🛡️ Setting Environment Guard
        run: |
          # Map all Sovereign Keys to the runner environment
          echo "ARK_API_KEY=${{ secrets.ARK_API_KEY }}" >> $GITHUB_ENV
          echo "SERP_API_KEY=${{ secrets.SERP_API_KEY }}" >> $GITHUB_ENV
          echo "COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }}" >> $GITHUB_ENV
          echo "FREE_CRYPTO_KEY=${{ secrets.FREE_CRYPTO_KEY }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV

      - name: 🧪 Verifying Geometric Integrity (Tests)
        run: |
          # Ensuring all integration tests pass before execution
          cargo test --release --manifest-path agent/Cargo.toml

      - name: ⏱️ Performance Profiling (Benches)
        run: |
          # Running benches with optimized sample size
          cargo bench --manifest-path agent/Cargo.toml

      - name: ⚡ Executing Penta-V Pulse
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Injection of the 5 Sovereign Keys for the binary runtime from GITHUB_ENV
          ARK_API_KEY: ${{ env.ARK_API_KEY }}
          SERP_API_KEY: ${{ env.SERP_API_KEY }}
          COINGECKO_API_KEY: ${{ env.COINGECKO_API_KEY }}
          FREE_CRYPTO_KEY: ${{ env.FREE_CRYPTO_KEY }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        run: |
          # Executing the sovereign agent logic with full multi-sector access enabled
          cargo run --release --manifest-path agent/Cargo.toml -- --debug

      - name: 📊 Generating Performance Report
        if: success()
        run: |
          # Processing pulse results into an audit-ready markdown report
          python3 scripts/speed_reporter.py

      - name: 🛡️ Committing to Truth-Vault
        if: success()
        run: |
          git config --global user.name "Ark Systems (Pulse-Bot)"
          git config --global user.email "bot@ark-systems.io"
          # Adding synchronized JSON vault, performance logs, and AI Generated SEO Index
          git add vault/truth-vault.json
          git add reports/performance_log.md || true
          git add index.html || true
          git commit -m "⚡ [PULSE] $(date -u +'%Y-%m-%dT%H:%M:%SZ') | Protocol 19 Deployed (SEO Index Updated)" || echo "No changes to commit"
          git push

      - name: 📢 Triggering Webhook Observer
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          # Instantaneous data projection to external observers
          if [ ! -z "$WEBHOOK_URL" ]; then
            curl -X POST $WEBHOOK_URL -H "Content-Type: application/json" -d @vault/truth-vault.json
          fi
