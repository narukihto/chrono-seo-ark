name: Chrono-SEO Pulse

on:
  schedule:
    - cron: '*/6 * * * *'
  workflow_dispatch: 

permissions:
  contents: write
  pages: write      
  id-token: write   

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛰️ Synchronizing Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🦀 Initializing Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚡ Executing Penta-V Pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # تشغيل المحرك من مجلد agent
          cargo run --release --manifest-path agent/Cargo.toml -- --debug

      - name: 🛡️ Committing Updated Data
        run: |
          git config --global user.name "Ark Systems (Pulse-Bot)"
          git config --global user.email "bot@ark-systems.io"
          # إضافة الملف من مكانه الصحيح (تأكد من المسار الذي يخرج فيه الملف)
          git add agent/truth-vault.json || git add truth-vault.json
          git commit -m "⚡ [PULSE] Protocol 1.1.0-PURIFIED" || echo "No changes"
          git push

      # --- مرحلة الحقن الصحيحة (بدون مجلد vault مفقود) ---

      - name: 🏗️ Injecting Data to Interface
        run: |
          # البحث عن ملف الحقيقة في المسارات المحتملة ونقله للواجهة
          if [ -f "agent/truth-vault.json" ]; then
            cp agent/truth-vault.json interface/truth-vault.json
          elif [ -f "truth-vault.json" ]; then
            cp truth-vault.json interface/truth-vault.json
          fi
          
          # نقل الجسر من مجلد التكامل
          cp integration/client_bridge.js interface/ || echo "Bridge not found"

      - name: 🏗️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 🚀 Uploading Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './interface'

      - name: 🏛️ Activation
        id: deployment
        uses: actions/deploy-pages@v4
