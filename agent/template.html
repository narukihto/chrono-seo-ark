<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Systems | SEO Pulse Engine</title>
    <style>
        :root {
            --primary: #00ffcc; 
            --bg: #0a0b10;
            --surface: #161b22;
            --text: #e6edf3;
            --dim: #8b949e;
            --accent: #0088ff;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            border-top: 4px solid var(--primary);
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--surface);
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 255, 204, 0.15);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        header {
            border-bottom: 1px solid rgba(139, 148, 158, 0.2);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .system-status {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 3px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2.8rem;
            margin: 15px 0;
            color: #fff;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .keyword-badge {
            display: inline-block;
            background: rgba(0, 255, 204, 0.05);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid rgba(0, 255, 204, 0.3);
            margin-top: 10px;
        }

        .content {
            line-height: 1.9;
            font-size: 1.15rem;
            color: var(--text);
            text-align: justify;
        }

        .content p {
            margin-bottom: 25px;
            position: relative;
        }

        footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(139, 148, 158, 0.2);
            font-size: 12px;
            color: var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .signature {
            color: var(--primary);
            font-weight: bold;
            text-decoration: none;
        }

        .glow-effect {
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="system-status">
                <span class="pulse-dot"></span>
                Ark Protocol 19 | Deployment Active
            </div>
            <h1 class="glow-effect">SEO Intelligence Report</h1>
            <div class="keyword-badge">SIG_TARGET: {{WORD}}</div>
        </header>

        <main class="content">
            {{CONTENT}}
        </main>

        <footer>
            <div>Lead Architect: <span class="signature">Isaac Andrew</span></div>
            <div>Verification: 0xARK-PQC-LWE-2026</div>
        </footer>
    </div>
</body>
</html>
