<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Systems | SEO Pulse Engine</title>
    <style>
        :root {
            --primary: #00ffcc; /* Aqua Tech */
            --bg: #0a0b10;
            --surface: #161b22;
            --text: #e6edf3;
            --dim: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            border-top: 4px solid var(--primary);
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--surface);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 255, 204, 0.1);
        }

        header {
            border-bottom: 1px solid rgba(139, 148, 158, 0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .system-status {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 2px;
            font-weight: bold;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #fff;
        }

        .keyword-badge {
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--primary);
            margin-top: 10px;
        }

        .content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--text);
        }

        .content p { margin-bottom: 20px; }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(139, 148, 158, 0.2);
            font-size: 12px;
            color: var(--dim);
            display: flex;
            justify-content: space-between;
        }

        .glow-effect {
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="system-status">● Ark Protocol 19 Active</div>
            <h1 class="glow-effect">SEO Pulse Analysis</h1>
            <div class="keyword-badge">Target: {{WORD}}</div>
        </header>

        <main class="content">
            {{CONTENT}}
        </main>

        <footer>
            <div>Generated by: <strong>Isaac Andrew</strong></div>
            <div>Auth: 0xARK-PQC-LWE</div>
        </footer>
    </div>
</body>
</html>
